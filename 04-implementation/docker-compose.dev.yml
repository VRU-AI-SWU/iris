# Development override — gpu-linux-server (LM Studio on host, port 1234)
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # No ollama service in dev — LM Studio runs on the host

  postgres:
    image: postgres:16-alpine
    container_name: iris-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iris
      POSTGRES_PASSWORD: iris_dev_password
      POSTGRES_DB: iris
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - iris_net

  redis:
    image: redis:7-alpine
    container_name: iris-redis-dev
    ports:
      - "6379:6379"
    networks:
      - iris_net

  # Rust Axum API
  api:
    build:
      context: ./backend-rust
      dockerfile: Dockerfile.api
    container_name: iris-api-dev
    env_file: .env
    environment:
      MODEL_SERVER_URL: http://host.docker.internal:1234/v1
      MODEL_API_KEY: lm-studio
      EXTRACTION_MODEL: google/gemma-4-e4b
      DATABASE_URL: postgresql://iris:iris_dev_password@postgres:5432/iris
      REDIS_URL: redis://redis:6379/0
      SIDECAR_URL: http://cluster-sidecar:8002
      UPLOAD_DIR: /app/data/tqf
      REPORTS_DIR: /app/data/reports
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - tqf_uploads:/app/data/tqf
      - reports:/app/data/reports
    depends_on:
      - postgres
      - redis
    networks:
      - iris_net

  # Rust Apalis worker
  worker:
    build:
      context: ./backend-rust
      dockerfile: Dockerfile.worker
    container_name: iris-worker-dev
    env_file: .env
    environment:
      MODEL_SERVER_URL: http://host.docker.internal:1234/v1
      MODEL_API_KEY: lm-studio
      EXTRACTION_MODEL: google/gemma-4-e4b
      DATABASE_URL: postgresql://iris:iris_dev_password@postgres:5432/iris
      REDIS_URL: redis://redis:6379/0
      SIDECAR_URL: http://cluster-sidecar:8002
      UPLOAD_DIR: /app/data/tqf
      REPORTS_DIR: /app/data/reports
      TEMPLATES_DIR: /app/templates
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - tqf_uploads:/app/data/tqf
      - reports:/app/data/reports
    depends_on:
      - postgres
      - redis
      - cluster-sidecar
    networks:
      - iris_net

  # Python HDBSCAN clustering microservice
  cluster-sidecar:
    build: ./cluster-sidecar
    container_name: iris-cluster-sidecar-dev
    ports:
      - "8002:8002"
    networks:
      - iris_net

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: iris-frontend-dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - iris_net

  nginx:
    image: nginx:alpine
    container_name: iris-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - iris_net

volumes:
  postgres_dev_data:
  tqf_uploads:
  reports:

networks:
  iris_net:
    driver: bridge
