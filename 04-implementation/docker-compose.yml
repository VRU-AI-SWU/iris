# Production stack — CSML server (NVIDIA A30, Ollama container)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: iris-ollama
    restart: unless-stopped
    volumes:
      - /home/comsci/models:/root/.ollama/models
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - iris_net

  postgres:
    image: postgres:16-alpine
    container_name: iris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iris_net

  redis:
    image: redis:7-alpine
    container_name: iris-redis
    restart: unless-stopped
    networks:
      - iris_net

  backend:
    build: ./backend
    container_name: iris-backend
    restart: unless-stopped
    env_file: .env
    environment:
      MODEL_SERVER_URL: http://ollama:11434/v1
    depends_on:
      - postgres
      - redis
    networks:
      - iris_net

  worker:
    build: ./worker
    container_name: iris-worker
    restart: unless-stopped
    env_file: .env
    environment:
      MODEL_SERVER_URL: http://ollama:11434/v1
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - iris_net

  frontend:
    build: ./frontend
    container_name: iris-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      - iris_net

  nginx:
    image: nginx:alpine
    container_name: iris-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - iris_net

volumes:
  postgres_data:

networks:
  iris_net:
    driver: bridge
