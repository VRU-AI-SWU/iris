# Production stack — CSML server (NVIDIA A30, Ollama container)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: iris-ollama
    restart: unless-stopped
    volumes:
      - /home/comsci/models:/root/.ollama/models
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - iris_net

  postgres:
    image: postgres:16-alpine
    container_name: iris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iris_net

  redis:
    image: redis:7-alpine
    container_name: iris-redis
    restart: unless-stopped
    networks:
      - iris_net

  # Rust Axum API (replaces Python FastAPI backend)
  api:
    build:
      context: ./backend-rust
      dockerfile: Dockerfile.api
    container_name: iris-api
    restart: unless-stopped
    env_file: .env
    environment:
      MODEL_SERVER_URL: http://ollama:11434/v1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SIDECAR_URL: http://cluster-sidecar:8002
      UPLOAD_DIR: /app/data/tqf
      REPORTS_DIR: /app/data/reports
    volumes:
      - tqf_uploads:/app/data/tqf
      - reports:/app/data/reports
    depends_on:
      - postgres
      - redis
    networks:
      - iris_net

  # Rust Apalis worker (replaces Python Celery worker)
  worker:
    build:
      context: ./backend-rust
      dockerfile: Dockerfile.worker
    container_name: iris-worker
    restart: unless-stopped
    env_file: .env
    environment:
      MODEL_SERVER_URL: http://ollama:11434/v1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SIDECAR_URL: http://cluster-sidecar:8002
      UPLOAD_DIR: /app/data/tqf
      REPORTS_DIR: /app/data/reports
      TEMPLATES_DIR: /app/templates
    volumes:
      - tqf_uploads:/app/data/tqf
      - reports:/app/data/reports
    depends_on:
      - postgres
      - redis
      - ollama
      - cluster-sidecar
    networks:
      - iris_net

  # Python HDBSCAN clustering microservice
  cluster-sidecar:
    build: ./cluster-sidecar
    container_name: iris-cluster-sidecar
    restart: unless-stopped
    networks:
      - iris_net

  frontend:
    build: ./frontend
    container_name: iris-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - api
    networks:
      - iris_net

  nginx:
    image: nginx:alpine
    container_name: iris-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - iris_net

volumes:
  postgres_data:
  tqf_uploads:
  reports:

networks:
  iris_net:
    driver: bridge
